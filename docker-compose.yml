services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: items
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - items
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    environment:
      PORT: 3000
      NODE_ENV: development
      DB_USER: postgres
      DB_HOST: db
      DB_PASSWORD: password123
      DB_NAME: items
      DB_PORT: 5432
      LOKI_HOST: loki
      LOKI_PORT: 3100
    networks:
      - items
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy
      loki:
        condition: service_started

  proxy:
    image: nginx:alpine
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - 80:80
    depends_on:
      api:
        condition: service_healthy
    networks:
      - items

  #### Observabilité ####

  # Agrégat de logues
  loki:
    image: grafana/loki:latest
    volumes:
      - loki_data:/loki
    networks:
      - items

  # Agrégat de métriques
  prom:
    image: prom/prometheus
    volumes:
      - prom_data:/prometheus
    networks:
      - items

  # Visualisation de logues et métriques
  grafana:
    image: grafana/grafana-oss
    volumes:
      - ./grafana.ini:/etc/grafana/grafana.ini
      - grafana_data:/var/lib/grafana
    networks:
      - items


volumes:
  postgres_data:
  loki_data:
  prom_data:
  grafana_data:

networks:
  items: